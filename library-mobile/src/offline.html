<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - Library Mobile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 2em;
      margin-bottom: 20px;
      font-weight: 600;
    }

    p {
      font-size: 1.1em;
      line-height: 1.6;
      margin-bottom: 15px;
      opacity: 0.9;
    }

    .features {
      margin: 30px 0;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      margin: 15px 0;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .feature-icon {
      font-size: 24px;
      margin-right: 15px;
      width: 40px;
      text-align: center;
    }

    button {
      background: #fff;
      color: #667eea;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      margin-top: 20px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📴</div>
    <h1>Sin Conexión</h1>
    <p>No tienes conexión a internet en este momento.</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📚</div>
        <div>Los libros que visitaste están disponibles offline</div>
      </div>
      <div class="feature">
        <div class="feature-icon">💾</div>
        <div>Tus datos están guardados de forma segura</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div>Se sincronizarán cuando vuelvas a estar online</div>
      </div>
    </div>

    <p>Intenta reconectar cuando tengas acceso a internet.</p>

    <button onclick="location.reload()">
      🔄 Reintentar Conexión
    </button>

    <div class="status" id="status">
      Verificando conexión...
    </div>
  </div>

  <script>
    // Verificar estado de la conexión
    function updateStatus() {
      const status = document.getElementById('status');
      if (navigator.onLine) {
        status.textContent = '✅ Conexión detectada - Recargando...';
        setTimeout(() => location.reload(), 1000);
      } else {
        status.textContent = '❌ Sin conexión a internet';
      }
    }

    // Actualizar cada 5 segundos
    setInterval(updateStatus, 5000);
    updateStatus();

    // Escuchar eventos de conexión
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = '✅ Conexión restaurada!';
      setTimeout(() => location.reload(), 1000);
    });
  </script>
</body>
</html>
