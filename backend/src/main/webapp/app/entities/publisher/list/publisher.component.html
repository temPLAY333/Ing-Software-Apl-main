<div class="container-fluid py-4">
  <div class="row mb-4">
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <h2 id="page-heading" data-cy="PublisherHeading" class="mb-0">
              <span jhiTranslate="libraryApp.publisher.home.title">Publishers</span>
            </h2>

            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary" (click)="load()" [disabled]="isLoading">
                <fa-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></fa-icon>
                <span class="d-none d-md-inline ms-1" jhiTranslate="libraryApp.publisher.home.refreshListLabel">Refresh list</span>
              </button>

              <button
                id="jh-create-entity"
                data-cy="entityCreateButton"
                class="btn btn-success jh-create-entity create-publisher"
                [routerLink]="['/publisher/new']"
              >
                <fa-icon icon="plus"></fa-icon>
                <span class="d-none d-md-inline ms-1" jhiTranslate="libraryApp.publisher.home.createLabel">Create a new Publisher</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <jhi-alert-error />

  <jhi-alert />

  <div class="row mb-3">
    <div class="col-12">
      <jhi-filter [filters]="filters" />
    </div>
  </div>

  @if (publishers().length === 0) {
    <div class="row">
      <div class="col-12">
        <div class="alert alert-warning shadow-sm" id="no-result">
          <fa-icon icon="info-circle" class="me-2"></fa-icon>
          <span jhiTranslate="libraryApp.publisher.home.notFound">No Publishers found</span>
        </div>
      </div>
    </div>
  } @else {
    <div class="row">
      <div class="col-12">
        <div class="card shadow-sm border-0">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0" aria-describedby="page-heading">
                <thead class="table-light">
                  <tr jhiSort [(sortState)]="sortState" (sortChange)="navigateToWithComponentValues($event)">
                    <th scope="col" jhiSortBy="id" class="text-center" style="width: 80px;">
                      <div class="d-flex justify-content-center align-items-center">
                        <span jhiTranslate="global.field.id">ID</span>
                        <fa-icon class="p-1" icon="sort"></fa-icon>
                      </div>
                    </th>
                    <th scope="col" jhiSortBy="name">
                      <div class="d-flex align-items-center">
                        <span jhiTranslate="libraryApp.publisher.name">Name</span>
                        <fa-icon class="p-1" icon="sort"></fa-icon>
                      </div>
                    </th>
                    <th scope="col" class="text-end" style="width: 200px;">
                      <span jhiTranslate="entity.action.actions">Actions</span>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  @for (publisher of publishers(); track trackId(publisher)) {
                    <tr data-cy="entityTable" class="border-bottom">
                      <td class="text-center">
                        <a [routerLink]="['/publisher', publisher.id, 'view']" class="badge bg-primary text-decoration-none px-3 py-2">
                          {{ publisher.id }}
                        </a>
                      </td>
                      <td>
                        <div class="d-flex align-items-center">
                          <fa-icon icon="building" class="text-info me-2"></fa-icon>
                          <strong>{{ publisher.name }}</strong>
                        </div>
                      </td>
                      <td class="text-end">
                        <div class="btn-group btn-group-sm" role="group">
                          <a
                            [routerLink]="['/publisher', publisher.id, 'view']"
                            class="btn btn-outline-info"
                            data-cy="entityDetailsButton"
                            title="View"
                          >
                            <fa-icon icon="eye"></fa-icon>
                            <span class="d-none d-lg-inline ms-1" jhiTranslate="entity.action.view">View</span>
                          </a>

                          <a
                            [routerLink]="['/publisher', publisher.id, 'edit']"
                            class="btn btn-outline-primary"
                            data-cy="entityEditButton"
                            title="Edit"
                          >
                            <fa-icon icon="pencil-alt"></fa-icon>
                            <span class="d-none d-lg-inline ms-1" jhiTranslate="entity.action.edit">Edit</span>
                          </a>

                          <button
                            type="submit"
                            (click)="delete(publisher)"
                            class="btn btn-outline-danger"
                            data-cy="entityDeleteButton"
                            title="Delete"
                          >
                            <fa-icon icon="times"></fa-icon>
                            <span class="d-none d-lg-inline ms-1" jhiTranslate="entity.action.delete">Delete</span>
                          </button>
                        </div>
                      </td>
                    </tr>
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  }

  @if (publishers().length > 0) {
    <div class="row mt-4">
      <div class="col-12">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
              <div class="text-muted">
                <jhi-item-count [params]="{ page, totalItems, itemsPerPage }" />
              </div>

              <div>
                <ngb-pagination
                  [collectionSize]="totalItems"
                  [page]="page"
                  [pageSize]="itemsPerPage"
                  [maxSize]="5"
                  [rotate]="true"
                  [boundaryLinks]="true"
                  (pageChange)="navigateToPage($event)"
                ></ngb-pagination>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
