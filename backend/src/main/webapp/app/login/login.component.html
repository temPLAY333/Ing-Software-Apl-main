<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <i class="bi bi-book"></i>
      </div>
      <h1 jhiTranslate="login.title">Sign in</h1>
      <p class="subtitle">Bienvenido al Sistema de Biblioteca</p>
    </div>

    @if (authenticationError()) {
      <div class="alert alert-danger" data-cy="loginError" jhiTranslate="login.messages.error.authentication">
        <strong>Failed to sign in!</strong> Please check your credentials and try again.
      </div>
    }

    <form class="login-form" (ngSubmit)="login()" [formGroup]="loginForm">
      <div class="form-group">
        <label for="username" jhiTranslate="global.form.username.label">Username</label>
        <input
          type="text"
          class="form-control"
          name="username"
          id="username"
          placeholder="{{ 'global.form.username.placeholder' | translate }}"
          formControlName="username"
          data-cy="username"
          #username
        />
      </div>

      <div class="form-group">
        <label for="password" jhiTranslate="login.form.password">Password</label>
        <input
          type="password"
          class="form-control"
          name="password"
          id="password"
          placeholder="{{ 'login.form.password.placeholder' | translate }}"
          formControlName="password"
          data-cy="password"
        />
      </div>

      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          name="rememberMe"
          id="rememberMe"
          formControlName="rememberMe"
        />
        <label class="form-check-label" for="rememberMe">
          <span jhiTranslate="login.form.rememberme">Remember me</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-login" data-cy="submit" jhiTranslate="login.form.button">
        Sign in
      </button>
    </form>

    <div class="login-links">
      <div class="alert alert-warning">
        <i class="bi bi-key me-2"></i>
        <a class="alert-link" routerLink="/account/reset/request" data-cy="forgetYourPasswordSelector" jhiTranslate="login.password.forgot">
          Did you forget your password?
        </a>
      </div>

      <div class="divider">
        <span>o</span>
      </div>

      <div class="alert alert-info">
        <i class="bi bi-person-plus me-2"></i>
        <span jhiTranslate="global.messages.info.register.noaccount">You don't have an account yet?</span>
        <a class="alert-link" routerLink="/account/register" jhiTranslate="global.messages.info.register.link">
          Register a new account
        </a>
      </div>
    </div>
  </div>
</div>
