input {
  # Receive logs from Filebeat
  beats {
    port => 5000
    type => "filebeat"
  }

  # TCP input for direct logging (optional)
  tcp {
    port => 5000
    codec => json_lines
    type => "tcp"
  }

  # UDP input for high-throughput logging (optional)
  udp {
    port => 5000
    codec => json_lines
    type => "udp"
  }
}

filter {
  # Parse JSON logs
  if [type] == "filebeat" or [type] == "tcp" or [type] == "udp" {
    json {
      source => "message"
      target => "parsed"
    }

    # Extract fields from parsed JSON
    mutate {
      add_field => {
        "application" => "%{[parsed][app]}"
        "environment" => "%{[parsed][environment]}"
        "log_level" => "%{[parsed][level]}"
        "logger_name" => "%{[parsed][logger_name]}"
        "thread_name" => "%{[parsed][thread_name]}"
      }
    }

    # Parse timestamp
    date {
      match => ["[parsed][@timestamp]", "ISO8601"]
      target => "@timestamp"
    }

    # Add geoip if IP field exists
    if [parsed][remote_ip] {
      geoip {
        source => "[parsed][remote_ip]"
        target => "geoip"
      }
    }

    # Remove unnecessary fields
    mutate {
      remove_field => ["message", "parsed"]
    }
  }

  # Add tags based on log level
  if [log_level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  } else if [log_level] == "WARN" {
    mutate {
      add_tag => ["warning"]
    }
  }

  # Add host information
  mutate {
    add_field => {
      "received_at" => "%{@timestamp}"
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "library-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug output (optional - comment out in production)
  stdout {
    codec => rubydebug
  }
}
