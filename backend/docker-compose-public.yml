# ============================================
# Docker Compose - Producción Pública
# Descarga imagen desde DockerHub y la ejecuta
# NO requiere código fuente ni Jenkins
# ============================================

version: '3.8'

services:
  # Base de datos PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: library-db
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library123
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library-network

  # Aplicación (desde DockerHub)
  app:
    image: templay333/library-app:latest
    container_name: library-app
    depends_on:
      database:
        condition: service_healthy
    environment:
      # Configuración de base de datos
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/library
      SPRING_DATASOURCE_USERNAME: library
      SPRING_DATASOURCE_PASSWORD: library123

      # Configuración de JPA/Hibernate
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

      # Profile activo
      SPRING_PROFILES_ACTIVE: prod

      # Configuración JWT (cambiar en producción)
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: YjY0LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1zaWduaW5nLWNoYW5nZS10aGlzLWluLXByb2R1Y3Rpb24=

    ports:
      - "8080:8080"
    networks:
      - library-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  library-network:
    driver: bridge
