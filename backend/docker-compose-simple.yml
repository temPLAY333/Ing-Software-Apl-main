# ================================
# Docker Compose - Servicios Esenciales
# Backend + Ionic + PostgreSQL + MailDev
# ================================
version: '3.8'

services:
  # ================================
  # PostgreSQL Database
  # ================================
  postgresql:
    image: postgres:16.2-alpine
    container_name: library-postgres
    environment:
      - POSTGRES_DB=library
      - POSTGRES_USER=library
      - POSTGRES_PASSWORD=library
      - POSTGRES_HOST_AUTH_METHOD=trust
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=30
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
       limits:
          cpus: '0.5'
          memory: 256M

  # ================================
  # Application (Backend)
  # ================================
  app:
    image: library-app:latest
    container_name: library-app
    build:
      context: .
      dockerfile: Dockerfile.simple
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/library
      - SPRING_DATASOURCE_USERNAME=library
      - SPRING_DATASOURCE_PASSWORD=library
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgresql:5432/library
      - SPRING_MAIL_HOST=maildev
      - SPRING_MAIL_PORT=1025
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=false
      - ENVIRONMENT=production
      - JAVA_OPTS=-Xmx256m -Xms128m
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M

  # ================================
  # Ionic Mobile App
  # ================================
  ionic-app:
    image: library-ionic:latest
    container_name: library-ionic
    build:
      context: ../library-mobile
      dockerfile: Dockerfile
    environment:
      - API_URL=http://app:8080
    ports:
      - "8100:8100"
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8100"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # ================================
  # MailDev
  # ================================
  maildev:
    image: maildev/maildev:latest
    container_name: library-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    environment:
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1080"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
