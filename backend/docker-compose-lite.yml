# ================================
# Docker Compose - LITE VERSION
# Solo lo esencial: App + PostgreSQL
# Optimizado para laptops con recursos limitados
# ================================
version: '3.8'

services:
  # ================================
  # Application (Optimizada)
  # ================================
  app:
    image: library-app:latest
    container_name: library-app
    build:
      context: .
      dockerfile: Dockerfile.simple
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/library
      - SPRING_DATASOURCE_USERNAME=library
      - SPRING_DATASOURCE_PASSWORD=library
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgresql:5432/library
      # Memoria reducida para laptop (256MB en lugar de 512MB)
      - JAVA_OPTS=-Xmx256m -Xms128m
      # Desactivar métricas de Prometheus para ahorrar recursos
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=false
      - ENVIRONMENT=production
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Límites de recursos para evitar consumo excesivo
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ================================
  # PostgreSQL Database (Optimizada)
  # ================================
  postgresql:
    image: postgres:16.2-alpine
    container_name: library-postgres
    environment:
      - POSTGRES_DB=library
      - POSTGRES_USER=library
      - POSTGRES_PASSWORD=library
      - POSTGRES_HOST_AUTH_METHOD=trust
      # Optimizaciones de PostgreSQL para recursos limitados
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=50
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - effective_cache_size=256MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Límites de recursos
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ================================
  # MailDev - OPCIONAL (comentar si no necesitas)
  # ================================
  maildev:
    image: maildev/maildev:latest
    container_name: library-maildev
    ports:
      - "1080:1080" # Web UI
      - "1025:1025" # SMTP server
    environment:
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1080"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
