# ================================
# Docker Compose - ELK ULTRA LITE VERSION
# ELK Stack ULTRA OPTIMIZADO para laptop
# Consumo: ~1GB RAM, ~120-150% CPU
# Más lento pero consume menos recursos
# ================================
version: '3.8'

services:
  # ================================
  # Application (Optimizada)
  # ================================
  app:
    image: library-app:latest
    container_name: library-app
    build:
      context: .
      dockerfile: Dockerfile.simple
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/library
      - SPRING_DATASOURCE_USERNAME=library
      - SPRING_DATASOURCE_PASSWORD=library
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgresql:5432/library
      - SPRING_MAIL_HOST=maildev
      - SPRING_MAIL_PORT=1025
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=false
      - ENVIRONMENT=production
      # REDUCIDO: 256MB en lugar de 512MB
      - JAVA_OPTS=-Xmx256m -Xms128m
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
    networks:
      - app-network
      - elk
    depends_on:
      postgresql:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/management/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 384M

  # ================================
  # PostgreSQL Database (Alpine = más ligero)
  # ================================
  postgresql:
    image: postgres:16.2-alpine
    container_name: library-postgres
    environment:
      - POSTGRES_DB=library
      - POSTGRES_USER=library
      - POSTGRES_PASSWORD=library
      - POSTGRES_HOST_AUTH_METHOD=trust
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=30
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ================================
  # Elasticsearch (ULTRA REDUCIDO: 192MB)
  # ================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: library-elasticsearch
    environment:
      - discovery.type=single-node
      # ULTRA REDUCIDO: 192MB (mínimo funcional)
      - "ES_JAVA_OPTS=-Xms192m -Xmx192m"
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=false
      # Desactivar features no esenciales
      - xpack.ml.enabled=false
      - xpack.graph.enabled=false
      - xpack.watcher.enabled=false
      - xpack.reporting.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      # OPTIMIZACIONES DE RENDIMIENTO (más lento, menos recursos)
      - indices.memory.index_buffer_size=10%
      - thread_pool.write.queue_size=200
      - thread_pool.search.queue_size=500
      # Refresh cada 30s en lugar de 1s (mucho menos CPU)
      - index.refresh_interval=30s
      # Reducir shards y replicas
      - index.number_of_shards=1
      - index.number_of_replicas=0
      # Translog menos frecuente
      - index.translog.durability=async
      - index.translog.sync_interval=30s
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 256M
        reservations:
          memory: 192M

  # ================================
  # Logstash (ULTRA REDUCIDO: 96MB)
  # ================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: library-logstash
    volumes:
      - ./src/main/docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./src/main/docker/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5000:5000"
      - "9600:9600"
    environment:
      # ULTRA REDUCIDO: 96MB (mínimo funcional)
      - "LS_JAVA_OPTS=-Xmx96m -Xms96m"
      # OPTIMIZACIONES: Procesa en lotes más grandes pero menos frecuentes
      - PIPELINE_WORKERS=1
      - PIPELINE_BATCH_SIZE=125
      - PIPELINE_BATCH_DELAY=50
      # Reducir uso de CPU
      - LOG_LEVEL=error
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          memory: 96M

  # ================================
  # Kibana (ULTRA OPTIMIZADO)
  # ================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: library-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - XPACK_SECURITY_ENABLED=false
      - XPACK_FLEET_ENABLED=false
      - XPACK_REPORTING_ENABLED=false
      - XPACK_ML_ENABLED=false
      - XPACK_GRAPH_ENABLED=false
      - XPACK_APM_ENABLED=false
      - XPACK_INFRA_ENABLED=false
      # Reducir recursos de Kibana al máximo
      - SERVER_MAXPAYLOADBYTES=1048576
      - LOGGING_QUIET=true
      - ELASTICSEARCH_REQUESTTIMEOUT=60000
      - ELASTICSEARCH_PINGTIMEOUT=30000
      # Polling menos frecuente (refresca cada 10s en lugar de 5s)
      - KIBANA_DEFAULTAPPID=discover
      - MONITORING_KIBANA_COLLECTION_ENABLED=false
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 448M
        reservations:
          memory: 320M

  # ================================
  # MailDev (Opcional - comentar si quieres ahorrar ~50MB)
  # ================================
  maildev:
    image: maildev/maildev:latest
    container_name: library-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    environment:
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:1080"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

networks:
  app-network:
    driver: bridge
  elk:
    driver: bridge

volumes:
  postgres_data:
  es_data:
  app_logs:
